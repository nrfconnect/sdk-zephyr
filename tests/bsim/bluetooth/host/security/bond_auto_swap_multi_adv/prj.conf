CONFIG_BT=y

CONFIG_BT_SMP=y

CONFIG_ASSERT=y
CONFIG_BT_TESTING=y
CONFIG_LOG=y

# 1 default identity + 2 identities for the test
CONFIG_BT_ID_MAX=3
CONFIG_BT_MAX_PAIRED=2

# Set to 4 to split 2 connections for Central and 2 for Peripheral in a single executable
CONFIG_BT_MAX_CONN=4

# Allow establishing 2 connections for Peripheral
CONFIG_BT_CTLR_SDC_PERIPHERAL_COUNT=2

CONFIG_BT_PRIVACY=y
CONFIG_BT_ID_AUTO_SWAP_MATCHING_BONDS=y

CONFIG_BT_FILTER_ACCEPT_LIST=y

CONFIG_BT_EXT_ADV=y

# This test uses 2 advertisers
CONFIG_BT_EXT_ADV_MAX_ADV_SET=2
