description: |
  Tags a memory-mapped flash/RRAM partition as an ARM TrustZone Secure code
  slot (e.g. the TF-M secure image). Peer of "nordic,tz-secure-data-partition".

  Inherits from "zephyr,mapped-partition", so a node carrying this compat is
  a fully-fledged memory-mapped NVM partition. The TF-M build additionally
  iterates this compat to compute FLASH_S_PARTITION_SIZE, the size of a
  single image slot (consumed as SECURE_IMAGE_MAX_SIZE). Multiple okay nodes
  are allowed for multi-slot MCUboot layouts; a BUILD_ASSERT enforces equal
  reg size across them.

  Example:

      slot0_partition: partition@0 {
          compatible = "nordic,tz-secure-code-partition";
          label = "image-0";
          reg = <0x0 DT_SIZE_K(512)>;
      };

compatible: "nordic,tz-secure-code-partition"

include: [zephyr,mapped-partition.yaml]
